<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Sala</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="display-room-name">Nome da Sala</h1>
            <button class="btn-logout" style="background-color: var(--text-muted);" onclick="window.location.href='dashboard.html'">Voltar</button>
        </header>

        <div class="card">
            <h2>Participantes</h2>
            <div id="participants-list" style="margin-bottom: 15px;"></div>
            <form id="add-participant-form" style="display:flex; gap:10px;">
                <input type="text" id="part-name" required placeholder="Adicionar por Nome/E-mail">
                <button type="submit" style="width:auto; white-space:nowrap;">Adicionar</button>
            </form>
        </div>

        <div class="card">
            <h2>Adicionar Despesa</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="exp-desc" required placeholder="Ex: Mercado, Padaria, Combustível">
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" step="0.01" id="exp-val" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Quem pagou?</label>
                    <select id="exp-paid-by" required>
                        </select>
                </div>
                <button type="submit">Adicionar Despesa</button>
            </form>
        </div>

        <div class="card">
            <h2>Histórico de Despesas</h2>
            <div id="expenses-history" style="margin-bottom: 20px;"></div>

            <h2 style="border-top: 1px solid var(--border); padding-top: 15px;">Fechamento de Contas</h2>
            <div id="room-summary">
                </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/room.js"></script>
</body>
</html>
