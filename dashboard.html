<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Minhas Salas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Salas</h1>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </header>

        <div class="card">
            <h2>Criar Nova Sala</h2>
            <form id="create-room-form">
                <div class="form-group">
                    <label>Nome da Sala (ex: Viagem de Férias)</label>
                    <input type="text" id="room-name" required placeholder="Digite o nome da sala...">
                </div>
                <button type="submit">Criar Sala</button>
            </form>
        </div>

        <div class="card">
            <h2>Suas Salas Disponíveis</h2>
            <div id="rooms-list">
                </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
